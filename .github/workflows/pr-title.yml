name: PR title

# release-please derives versions/changelog entries from conventional-commit
# titles on squash-merged PRs. This just checks the PR title is well-formed
# so a malformed one doesn't merge and get silently ignored (or misfiled).

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  statuses: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
