name: CLA Assistant

# Gates every pull request on a signed Contributor License Agreement.
# Contributors sign once by commenting the phrase below on their PR; the
# signature (keyed to their GitHub login) is recorded and reused for all
# future PRs. See CONTRIBUTING.md and .github/CLA.md.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Text contributors comment on the PR to sign.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'

          # The CLA contributors are agreeing to.
          path-to-document: 'https://github.com/typicalday/owenloop/blob/main/.github/CLA.md'

          # Where signatures are stored. Kept on a dedicated branch so signature
          # commits don't clutter main. Create the branch once (see CONTRIBUTING
          # / setup notes) before enabling this workflow.
          branch: 'cla-signatures'
          path-to-signatures: 'signatures/version1/cla.json'

          # Accounts that never need to sign: the owner and bots.
          allowlist: 'alexattd,dependabot[bot],*[bot]'
