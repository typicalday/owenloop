name: release-please

# Maintains CHANGELOG.md and package.json version via a standing release PR.
# Merging that PR creates the GitHub release + tag, which triggers
# npm-publish.yml to build and publish the package.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived token from the org's release App. Using this instead
      # of the default GITHUB_TOKEN is what lets the release PR trigger other
      # workflows (CI, CLA, pr-title) -- GITHUB_TOKEN-authored events can't, so
      # required checks would otherwise hang unreported and the PR couldn't merge.
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
